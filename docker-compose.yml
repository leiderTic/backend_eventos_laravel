services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - laravel-net

  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: db_events
      MYSQL_USER: cfchm_user
      MYSQL_PASSWORD: cfchm_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3308:3306"
    volumes:
      - db_laravel_data:/var/lib/mysql
    networks:
      - laravel-net

networks:
  laravel-net:
    driver: bridge

volumes:
  db_laravel_data:
